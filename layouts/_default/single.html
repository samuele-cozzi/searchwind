{{ define "main" }}
<article class="max-w-3xl">
  <h1 class="text-3xl md:text-4xl font-bold mb-4">{{ .Title }}</h1>
  
  {{ if .Params.tags }}
    <div class="flex flex-wrap gap-2 mb-6">
      {{ range .Params.tags }}
        <span class="text-sm bg-blue-100 text-blue-800 px-3 py-1 rounded-full">{{ . }}</span>
      {{ end }}
    </div>
  {{ end }}

  <div class="prose prose-sm md:prose max-w-none">
    {{ .Content }}
  </div>

  <nav class="mt-8 pt-6 border-t border-gray-200">
    <div class="flex justify-between">
      {{ with .PrevInSection }}
        <a href="{{ .Permalink }}" class="text-blue-600 hover:text-blue-800">&larr; {{ .Title }}</a>
      {{ end }}
      {{ with .NextInSection }}
        <a href="{{ .Permalink }}" class="text-blue-600 hover:text-blue-800">{{ .Title }} &rarr;</a>
      {{ end }}
    </div>
  </nav>
</article>
{{ end }}
