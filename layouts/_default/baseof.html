      --color-secondary-active: #0284C7;
      --color-secondary-outline: #7DD3FC;

      /* Accent */

      --color-accent-hover: #F59E0B;
      --color-accent-active: #D97706;
      --color-accent-outline: #FCD34D;

      /* Backgrounds */
      --color-bg: #f4cccc;
      --color-bg-card: #FFFFFF;

      /* Text Colors */
      --text-base: #111827;   /* gray-900 */
      --text-muted: #4B5563;  /* gray-600 */

      --text-primary: #1407cf;
      --text-secondary: #0C4A6E;
      --text-accent: #92400E;
    }

    .dark {
      /* Primary */
      --color-primary: #3730A3;
      --color-primary-hover: #312E81;
      --color-primary-active: #1E1B4B;
      --color-primary-outline: #4C51BF;

      /* Secondary */
      --color-secondary: #075985;
      --color-secondary-hover: #0C4A6E;
      --color-secondary-active: #082F49;
      --color-secondary-outline: #38BDF8;

      /* Accent */
      --color-accent: #B45309;
      --color-accent-hover: #92400E;
      --color-accent-active: #78350F;
      --color-accent-outline: #F59E0B;

      /* Backgrounds */
      --color-bg: #1F2937;
      --color-bg-card: #111827;

      /* Text Colors */
      --text-base: #E5E7EB;   /* gray-200 */
      --text-muted: #9CA3AF;  /* gray-400 */

      --text-primary: #A5B4FC;
      --text-secondary: #7DD3FC;
      --text-accent: #FCD34D;
    }
  </style>

<body class="h-screen overflow-hidden bg-background-card">

    <div class="flex h-full">

        <!-- LEFT SIDEBAR -->
        <aside id="leftSidebar" class="transition-all duration-300 w-80 md:block hidden p-3 overflow-y-auto">

            <div class="flex items-center justify-between p-3">
                <span class="font-semibold text-lg text-base" id="leftTitle">{{ .Title }}</span>
                <button id="openMenu" onclick="toggleLeft()">
                    <div class="flex items-center justify-center">
                      {{ partial "icon" "bars" }}
                    </div>
                </button>
            </div>

            {{ partial "sidebar-tags" . }}
        </aside>

        <!-- MAIN CONTENT -->
        <div class="flex-1 flex flex-col ">

            <header class="flex bg-background-card items-center justify-between px-6 py-3 absolute mx-auto inset-x-0 bottom-0">

                <a href="/">
                  <div class="flex items-center justify-center">{{ partial "icon" .Site.Params.logo }}</div>
                </a>

                <nav id="menu"
                    class="w-full max-md:overflow-hidden items-center justify-center backdrop-blur flex-col row flex">
                    <form id="globalSearch" class="w-full px-4 flex items-center justify-center" role="search"
                        aria-label="Global">
                        <div class="relative w-full">
                            <label for="q" class="sr-only">{{ .Title }}</label>
                            <span class="pointer-events-none absolute inset-y-0 left-3 flex items-center text-primary">
                                {{ partial "icon" "search" }}
                            </span>

                            <input id="q" name="q" type="search" autocomplete="off" placeholder={{ .Title }} class="w-full rounded-full border border-secondary bg-background pl-10 pr-24 py-2.5
                                    text-sm text-primary placeholder:text-primary
                                    focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary" />
                        </div>
                    </form>
                </nav>

                <div class="flex items-center space-x-4">
                  <button id="openMenu" onclick="toggleLeftFull()">
                        <div class="flex items-center justify-center">
                          {{ partial "icon" "bars" }}
                        </div>
                    </button>
                    <button
                      id="appearance-switcher"
                      aria-label="Dark mode switcher"
                      class="bf-icon-color-hover">
                      <div class="flex items-center justify-center dark:hidden">
                        {{ partial "icon" "moon" }}
                      </div>
                      <div class="items-center justify-center hidden dark:flex">
                        {{ partial "icon" "sun" }}
                      </div>
                    </button>
                    <button id="openMenu" onclick="openDrawer()">
                        <div class="flex items-center justify-center">
                          {{ partial "icon" "settings" }}
                        </div>
                    </button>
                </div>

            </header>

            <!-- CONTENT AREA -->
            <main class="flex-1 inset-0 top-24 bg-card p-2 pb-16 overflow-hidden">
                <div class="bg-background rounded-2xl p-2 w-full h-full overflow-y-auto">
                  <div>
                    {{ block "main" . }}{{ end }}
                  </div>
                </div>
            </main>


        </div>

        <!-- Drawer Backdrop -->
        <div id="drawerBackdrop" class="fixed inset-0 bg-black/40 z-40 hidden" aria-hidden="true"></div>

        <!-- Drawer Panel -->
        <aside id="drawerPanel" class="fixed inset-y-0 right-0 z-50 w-full max-w-md transform translate-x-full
                    bg-background shadow-2xl transition-transform duration-300 ease-out
                    rounded-l-2xl focus:outline-none hidden" role="dialog" aria-modal="true"
            aria-labelledby="drawerTitle" aria-describedby="drawerDesc">
            {{ partial "sidebar-options" . }}
        </aside>

    </div>

    
    <script>
      // DARK MODE SCRIPT 
      const root = document.documentElement;
      const toggle = document.getElementById("appearance-switcher");

      toggle.addEventListener("click", () => {
        root.classList.toggle("dark");
        localStorage.setItem("darkMode", root.classList.contains("dark") ? "true" : "false");
      });

      /* Load stored preference */
      if (localStorage.getItem("darkMode") === "true") {
        root.classList.add("dark");
      }

      // LEFT SIDEBAR TOGGLE
        let collapsedLeft = false;

        function toggleLeft() {
            const sb = document.getElementById("leftSidebar");
            const labels = document.querySelectorAll(".lbl-left");
            const title = document.getElementById("leftTitle");

            collapsedLeft = !collapsedLeft;

            sb.style.width = collapsedLeft ? "70px" : "256px";
            labels.forEach(l => l.style.display = collapsedLeft ? "none" : "inline");
            title.style.display = collapsedLeft ? "none" : "inline";
        }

        function toggleLeftFull() {
            const sb = document.getElementById("leftSidebar");
            //const labels = document.querySelectorAll(".lbl");
            const isHidden = sb.style.width === "0px";

            sb.style.width = isHidden ? "320px" : "0px";
            if (isHidden) sb.classList.remove("hidden");
            else sb.classList.add("hidden");
        }

        /* === Drawer logic === */
        const drawerPanel = document.getElementById('drawerPanel');
        const drawerBackdrop = document.getElementById('drawerBackdrop');

        let lastFocusedElement = null;

        function getFocusable(container) {
            return Array.from(container.querySelectorAll(
                'a[href], button:not([disabled]), textarea, input, select, [tabindex]:not([tabindex="-1"])'
            ));
        }

        function openDrawer() {
            lastFocusedElement = document.activeElement;

            // Show elements
            drawerBackdrop.classList.remove('hidden');
            drawerPanel.classList.remove('hidden');

            // Trigger slide-in
            requestAnimationFrame(() => {
                drawerPanel.classList.remove('translate-x-full');
            });

            // Accessibility
            drawerPanel.setAttribute('aria-hidden', 'false');
            drawerBackdrop.setAttribute('aria-hidden', 'false');

            // Focus first focusable element
            const focusables = getFocusable(drawerPanel);
            if (focusables.length) focusables[0].focus();

            // ESC + focus trap
            document.addEventListener('keydown', handleDrawerKeydown);
            drawerBackdrop.addEventListener('click', closeDrawer, { once: true });
        }

        function closeDrawer() {
            // Slide out
            drawerPanel.classList.add('translate-x-full');

            drawerPanel.setAttribute('aria-hidden', 'true');
            drawerBackdrop.setAttribute('aria-hidden', 'true');

            // After transition, hide
            const onEnd = () => {
                drawerPanel.classList.add('hidden');
                drawerBackdrop.classList.add('hidden');
                drawerPanel.removeEventListener('transitionend', onEnd);
            };
            drawerPanel.addEventListener('transitionend', onEnd);

            // Remove listeners
            document.removeEventListener('keydown', handleDrawerKeydown);

            // Restore focus
            if (lastFocusedElement && typeof lastFocusedElement.focus === 'function') {
                lastFocusedElement.focus();
            }
        }

        function toggleDrawer() {
            if (drawerPanel.classList.contains('hidden') || drawerPanel.classList.contains('translate-x-full')) {
                openDrawer();
            } else {
                closeDrawer();
            }
        }

        function handleDrawerKeydown(e) {
            if (e.key === 'Escape') {
                e.preventDefault();
                closeDrawer();
                return;
            }
            if (e.key === 'Tab') {
                const focusables = getFocusable(drawerPanel);
                if (!focusables.length) return;

                const first = focusables[0];
                const last = focusables[focusables.length - 1];

                if (e.shiftKey && document.activeElement === first) {
                    e.preventDefault();
                    last.focus();
                } else if (!e.shiftKey && document.activeElement === last) {
                    e.preventDefault();
                    first.focus();
                }
            }
        }
    </script>

</body>
</html>
