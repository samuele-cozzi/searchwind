{{ define "main" }}
<div class="space-y-4">
  <!-- <h1 class="text-2xl md:text-3xl font-bold mb-6">{{ .Title }}</h1> -->
  
  {{ range .Pages }}
    <article class="flex gap-4 p-4 bg-white border border-gray-300 rounded-lg hover:shadow-md transition-shadow">
      <!-- Thumbnail placeholder -->
      <div class="flex-shrink-0 w-12 h-12 md:w-16 md:h-16 bg-gray-300 rounded flex items-center justify-center">
        <span class="text-gray-600 text-2xl">✕</span>
        <!-- <img
            src="{{ . }}"
            role="presentation"
            loading="lazy"
            decoding="async"
            fetchpriority="low"

            class="not-prose absolute inset-0 w-full h-full object-cover"> -->
      </div>
      
      <!-- Content -->
      <div class="flex-1">
        <a href="{{ .RelPermalink }}" class="text-lg font-semibold text-gray-900 hover:text-blue-600 block mb-1">
          {{ .Title }}
        </a>
        {{ if .Params.tags }}
          <div class="flex flex-wrap gap-1">
            {{ range .Params.tags }}
              <span class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded">{{ . }}</span>
            {{ end }}
          </div>
        {{ else }}
          <p class="text-sm text-gray-600">tags</p>
        {{ end }}
      </div>
    </article>
  {{ end }}
</div>
{{ end }}
